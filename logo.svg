<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" fill="none">
  <!-- ============================================================
       NKOMO CUTZ LOGO
       Mark: Geometric razor blade / clipper blade shape
       Type: Bebas Neue style stacked wordmark
       Colors: #080808 bg / #C9A84C gold / #F5F5F5 white
       ============================================================ -->

  <!-- Blade mark: a sharp angular chevron/blade shape -->
  <g transform="translate(4, 10)">
    <!-- Outer blade silhouette -->
    <polygon points="0,40 28,0 44,0 16,40 44,80 28,80" fill="#C9A84C"/>
    <!-- Inner negative space cut -->
    <polygon points="10,40 30,8 38,8 18,40 38,72 30,72" fill="#080808"/>
    <!-- Second blade element (offset, thinner) -->
    <polygon points="22,40 42,8 50,8 30,40 50,72 42,72" fill="#C9A84C" opacity="0.45"/>
  </g>

  <!-- Wordmark: NKOMO -->
  <text
    x="68"
    y="46"
    font-family="'Bebas Neue', Impact, sans-serif"
    font-size="44"
    font-weight="400"
    letter-spacing="4"
    fill="#F5F5F5"
  >NKOMO</text>

  <!-- Wordmark: CUTZ with gold treatment -->
  <text
    x="68"
    y="86"
    font-family="'Bebas Neue', Impact, sans-serif"
    font-size="44"
    font-weight="400"
    letter-spacing="4"
    fill="#C9A84C"
  >CUTZ</text>

  <!-- Hairline rule between words -->
  <line x1="68" y1="52" x2="318" y2="52" stroke="#C9A84C" stroke-width="0.75" opacity="0.4"/>

  <!-- Tagline micro text -->
  <text
    x="70"
    y="97"
    font-family="'Inter', Helvetica, sans-serif"
    font-size="7.5"
    font-weight="600"
    letter-spacing="3.5"
    fill="#9E9E9E"
  >SHARP · CLEAN · $20</text>
</svg>
